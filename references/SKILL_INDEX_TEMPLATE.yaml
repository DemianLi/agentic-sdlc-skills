# SKILL_INDEX.yaml — Token Budget Router Index
#
# 用途：s0-skill-budget 的 I 軸（Index Coverage）依賴此文件。
#       s-fast-track 可讀此文件做 keyword → skill 的 O(1) 路由。
#
# ── 格式規則 ────────────────────────────────────────────────
#   - 每個 keyword 只能對應一個 skill（嚴格互斥）
#   - keyword 應為動詞短語或名詞，不超過 3 個英文單字
#   - 每個 skill 至少 2 個 keyword
#
# ── 維護流程（新增或修改 skill 時依序執行）─────────────────
#
#   步驟 1 — 更新此文件
#     新增 skill：在對應 Stage 區塊加入 ≥2 個 keyword，值為 skill name
#     修改 skill name：全文替換舊 name → 新 name
#     移除 skill：刪除所有指向該 skill 的 keyword 行
#
#   步驟 2 — 執行 Token Budget Audit（/s0-skill-budget）
#     對象：剛新增或修改的 SKILL.md
#     通過標準：
#       D1 description ≤ 40 tokens
#       D2 含 "Use when" + 任務類型觸發詞
#       D4 含 "NOT" 排除子句
#       I1 skill name 已出現為 index value（即本文件）
#       I2 ≥ 2 個 keyword 指向此 skill
#       I3 無 keyword 與相鄰 stage skill 重疊
#       S1 skill 檔案 ≤ 10 KB
#       S2 無任何 ### section 超過 50 行
#     若任一項 ❌ FAIL → 修正後重跑，不合入
#
#   步驟 3 — 選用：執行完整結構審計（/s0-eval-skill）
#     僅在下列情況需要：新 skill 首次上線、或 <what-to-do> 有大幅改寫
#     通過標準：6/6 PASS（見 references/scoring-rubric.md）

