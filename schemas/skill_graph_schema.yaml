skills:
  s1-define-rules:
    stage: 1
    requires: []
    outputs:
      - RULES.md

  s1-config-context:
    stage: 1
    requires: []
    outputs:
      - CONTEXT.md

  s1-lock-tech-stack:
    stage: 1
    requires:
      - s1-define-rules
      - s1-config-context
    outputs:
      - docs/adr/*-tech-stack.md

  s1-git-guardrails:
    stage: 1
    requires:
      - s1-define-rules
    outputs: []

  s2-capture-vision:
    stage: 2
    requires:
      - s1-lock-tech-stack
    outputs:
      - docs/specs/*-vision.md

  s2-align-req:
    stage: 2
    requires:
      - s2-capture-vision
    outputs:
      - docs/specs/*-alignment.md

  s2-struct-req:
    stage: 2
    requires:
      - s2-align-req
    outputs:
      - docs/specs/*-requirements.md

  s2-snapshot-ctx:
    stage: 2
    requires:
      - s2-struct-req
    outputs:
      - CONTEXT_SNAPSHOT.md
    validators:
      - type: regex_match
        file: CONTEXT_SNAPSHOT.md
        pattern: "## "
        min_matches: 2
        error_msg: "CONTEXT_SNAPSHOT.md 必須包含至少 2 個章節標題（內容不能為空殼）"

  s3-eval-system:
    stage: 3
    requires:
      - s2-snapshot-ctx
    outputs:
      - docs/arch/*-impact.md

  s3-design-arch:
    stage: 3
    requires:
      - s3-eval-system
    outputs:
      - docs/arch/*-design.md
    validators:
      - type: regex_match
        file: "docs/arch/*-design.md"
        pattern: "mermaid"
        min_matches: 1
        error_msg: "設計文件必須包含 Mermaid 圖（序列圖或架構圖）"

  s3-breakdown-wbs:
    stage: 3
    requires:
      - s3-design-arch
    outputs:
      - docs/arch/*-wbs.md

  s3-build-dag:
    stage: 3
    requires:
      - s3-breakdown-wbs
    outputs:
      - TASK_DAG.md
    validators:
      - type: regex_match
        file: TASK_DAG.md
        pattern: "mermaid"
        min_matches: 1
        error_msg: "TASK_DAG.md 必須包含 Mermaid DAG 圖"
      - type: regex_match
        file: TASK_DAG.md
        pattern: "- \\["
        min_matches: 3
        error_msg: "TASK_DAG.md 必須包含至少 3 個任務項目"

  s4-setup-env:
    stage: 4
    requires:
      - s3-build-dag
    outputs: []

  s4-impl-task:
    stage: 4
    requires:
      - s4-setup-env
    outputs: []

  s4-tdd:
    stage: 4
    requires:
      - s4-setup-env
    outputs: []

  s4-local-debug:
    stage: 4
    requires:
      - s4-impl-task
      - s4-tdd
    outputs: []

  s5-sast-lint:
    stage: 5
    requires:
      - s4-local-debug
    outputs:
      - docs/audit/*-sast.md
    validators:
      - type: regex_match
        file: "docs/audit/*-sast.md"
        pattern: "CRITICAL|WARNING|PASS"
        min_matches: 1
        error_msg: "SAST 報告必須包含嚴重性評級（CRITICAL / WARNING / PASS）"

  s5-audit-rules:
    stage: 5
    requires:
      - s5-sast-lint
    outputs:
      - docs/audit/*-audit.md

  s5-pr-review:
    stage: 5
    requires:
      - s5-audit-rules
    outputs:
      - docs/audit/*-pr-review.md

  s5-fix-optimize:
    stage: 5
    requires:
      - s5-pr-review
    outputs: []

  s6-test-integration:
    stage: 6
    requires:
      - s5-fix-optimize
    outputs:
      - docs/tests/*-integration-results.md

  s6-test-e2e:
    stage: 6
    requires:
      - s6-test-integration
    outputs:
      - docs/tests/*-e2e-results.md

  s6-test-perf:
    stage: 6
    requires:
      - s6-test-e2e
    outputs:
      - docs/tests/*-perf-baseline.json
    validators:
      - type: regex_match
        file: "docs/tests/*-perf-baseline.json"
        pattern: "p99|P99"
        min_matches: 1
        error_msg: "效能基準必須包含 P99 指標"

  s6-verify-release:
    stage: 6
    requires:
      - s6-test-perf
    outputs:
      - test-results.json
    validators:
      - type: json_query
        file: test-results.json
        query: ".summary.failed == 0"
        error_msg: "所有測試必須通過（failed == 0）"
      - type: json_query
        file: test-results.json
        query: ".summary.total > 0"
        error_msg: "測試套件不能為空（total > 0）"
      - type: file_hash
        file: test-results.json
        not_older_than_sentinel: true
        error_msg: "測試報告必須比 sentinel 更新（防止複製舊報告）"

  s7-build-artifact:
    stage: 7
    requires:
      - s6-verify-release
    outputs: []

  s7-release-notes:
    stage: 7
    requires:
      - s7-build-artifact
    outputs:
      - CHANGELOG.md
    validators:
      - type: regex_match
        file: CHANGELOG.md
        pattern: "## \\["
        min_matches: 1
        error_msg: "CHANGELOG.md 必須符合 Keep a Changelog 格式（## [版本號]）"

  s7-deploy:
    stage: 7
    requires:
      - s7-release-notes
    outputs:
      - docs/releases/*-deploy.md

  s7-telemetry:
    stage: 7
    requires:
      - s7-deploy
    outputs:
      - docs/releases/*-telemetry.json

  # ── Stage 0: Standalone Skills (V3.0 補錄) ──────────────────
  # 這 6 個節點存在於磁碟但未在 schema 中註冊。
  # stage: 0 表示它們無 pipeline 依賴，in_degree=0，可隨時觸發。
  s-fast-track:
    stage: 0
    requires: []
    outputs:
      - skills/s-fast-track/SKILL.md

  s0-eval-alignment:
    stage: 0
    requires: []
    outputs:
      - skills/s0-eval-alignment/SKILL.md

  s0-eval-skill:
    stage: 0
    requires: []
    outputs:
      - skills/s0-eval-skill/SKILL.md

  s0-skill-budget:
    stage: 0
    requires: []
    outputs:
      - skills/s0-skill-budget/SKILL.md

  s0-trace-feature:
    stage: 0
    requires: []
    outputs:
      - skills/s0-trace-feature/SKILL.md

  s0-semantic-validate:
    stage: 0
    requires: []
    outputs:
      - skills/s0-semantic-validate/SKILL.md

  s0-grill:
    stage: 0
    requires: []
    outputs:
      - skills/s0-grill/SKILL.md

  s0-grill-docs:
    stage: 0
    requires: []
    outputs:
      - skills/s0-grill-docs/SKILL.md
